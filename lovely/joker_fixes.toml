[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# fix seance
[[patches]]
[patches.pattern]
target = "card.lua"
position = "at"
pattern = '''
if next(context.poker_hands[self.ability.extra.poker_hand]) then
'''
payload = '''
if SuikaLatro.triggered_combos[self.ability.extra.poker_hand] then
'''
match_indent = true
overwrite = false

# fix seeing double
[[patches]]
[patches.pattern]
target = "card.lua"
position = "at"
pattern = '''
if self.ability.name == 'Seeing Double' then
'''
payload = '''
if false and self.ability.name == 'Seeing Double' then
'''
match_indent = true
overwrite = false

# fix flower pot
[[patches]]
[patches.pattern]
target = "card.lua"
position = "at"
pattern = '''
if self.ability.name == 'Flower Pot' then
'''
payload = '''
if false and self.ability.name == 'Flower Pot' then
'''
match_indent = true
overwrite = false